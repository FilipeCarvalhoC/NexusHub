{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center align-items-center"
         style="min-height: 80vh;">

        <div class="col-md-5">

            <div class="card border-0 shadow rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <i class="bi bi-diagram-3-fill"
                           style="font-size: 60px; color: #0d6efd;">
                        </i>

                        <h2 class="fw-bold mt-3">
                            NexusHub
                        </h2>

                        <p class="text-muted">
                            Sistema de Gestão de Conhecimento
                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Usuário
                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control form-control-lg">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Senha
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control form-control-lg">

                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100 btn-lg rounded-pill">

                            Entrar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
