{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="card border-0 shadow rounded-4">

        <div class="card-body p-5 text-center">

            <h2 class="fw-bold text-danger mb-4">

                Excluir Setor

            </h2>

            <p class="mb-4">

                Deseja realmente excluir o setor:

                <strong>
                    {{ setor.nome }}
                </strong>?

            </p>

            <form method="POST">

                {% csrf_token %}

                <button type="submit"
                        class="btn btn-danger rounded-pill">

                    Sim, Excluir

                </button>

                <a href="/"
                   class="btn btn-secondary rounded-pill">

                    Cancelar

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
