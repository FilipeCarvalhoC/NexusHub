{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="card shadow border-0 rounded-4">

        <div class="card-body p-5 text-center">

            <h2 class="text-danger fw-bold">

                Excluir Relatório

            </h2>

            <p class="mt-4">

                Deseja realmente excluir:

            </p>

            <h4>

                {{ relatorio.titulo }}

            </h4>

            <form method="POST">

                {% csrf_token %}

                <button
                    class="btn btn-danger rounded-pill">

                    Confirmar Exclusão

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
